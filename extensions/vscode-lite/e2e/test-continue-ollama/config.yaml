name: Continue Lite E2E (Ollama)
version: 0.0.1
schema: v1

models:
  - name: Ollama Qwen2.5 Coder 1.5B
    provider: ollama
    model: qwen2.5-coder:1.5b
    apiBase: http://localhost:11434/
    roles:
      - autocomplete
    defaultCompletionOptions:
      temperature: 0.1
      maxTokens: 128
    autocompleteOptions:
      debounceDelay: 0
      modelTimeout: 60000

